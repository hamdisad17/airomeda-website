name: Deploy to Hostinger VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}

      - name: Prepare standalone bundle
        run: |
          # Next.js standalone output requires static + public to be copied alongside server.js
          cp -r .next/static .next/standalone/.next/static
          if [ -d public ]; then cp -r public .next/standalone/public; fi
          # Bundle PM2 config so the deploy step can reload from the release dir
          cp ecosystem.config.cjs .next/standalone/ecosystem.config.cjs

      - name: Set up SSH (with retry)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # ssh-keyscan can fail transiently when the VPS sshd is briefly
          # unresponsive (Hostinger maintenance window, brief network
          # blip). Retry up to 3 times with a 10s gap so a one-off blip
          # doesn't kill the deploy.
          for attempt in 1 2 3; do
            if ssh-keyscan -T 10 -H -p ${{ vars.VPS_PORT || 22 }} ${{ vars.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null; then
              if [ -s ~/.ssh/known_hosts ]; then
                echo "✓ ssh-keyscan succeeded on attempt $attempt"
                exit 0
              fi
            fi
            echo "ssh-keyscan attempt $attempt failed — retrying in 10s..."
            sleep 10
          done
          echo "✗ ssh-keyscan failed after 3 attempts — aborting deploy"
          exit 1

      - name: Capture previous release for rollback
        id: prev
        run: |
          PREV=$(ssh -i ~/.ssh/deploy_key -p ${{ vars.VPS_PORT || 22 }} ${{ vars.VPS_USER }}@${{ vars.VPS_HOST }} \
            "readlink /var/www/airomeda/current 2>/dev/null || echo none")
          echo "Previous release: $PREV"
          echo "release=$PREV" >> $GITHUB_OUTPUT

      - name: rsync release to VPS
        env:
          RELEASE: ${{ github.sha }}-${{ github.run_number }}
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ vars.VPS_PORT || 22 }} ${{ vars.VPS_USER }}@${{ vars.VPS_HOST }} "mkdir -p /var/www/airomeda/releases/${RELEASE}"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ vars.VPS_PORT || 22 }}" \
            .next/standalone/ \
            ${{ vars.VPS_USER }}@${{ vars.VPS_HOST }}:/var/www/airomeda/releases/${RELEASE}/

      - name: Activate release and reload PM2
        env:
          RELEASE: ${{ github.sha }}-${{ github.run_number }}
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ vars.VPS_PORT || 22 }} ${{ vars.VPS_USER }}@${{ vars.VPS_HOST }} bash <<EOF
            set -e
            cd /var/www/airomeda

            # Symlink shared .env into the new release
            ln -sfn /var/www/airomeda/shared/.env.production releases/${RELEASE}/.env.production || true

            # Switch current symlink and reload PM2
            ln -sfn releases/${RELEASE} current
            cd current
            pm2 reload /var/www/airomeda/current/ecosystem.config.cjs --update-env 2>/dev/null \
              || pm2 start /var/www/airomeda/current/ecosystem.config.cjs

            # Keep the last 5 releases, delete older ones
            cd /var/www/airomeda/releases
            ls -1tr | head -n -5 | xargs -r rm -rf
          EOF

      - name: Smoke check
        id: smoke
        run: |
          # Health check verifies the Node process itself, not a static page.
          # A cached /tr from nginx could return 200 even if PM2 is down;
          # /api/health forces a request through to the app.
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sfL -o /dev/null -w "%{http_code}" "https://${{ vars.PUBLIC_HOSTNAME }}/api/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ app healthy (200 at /api/health)"
              exit 0
            fi
            if [ "$STATUS" = "503" ]; then
              echo "Attempt $i: app reachable but env-degraded (503 at /api/health) — retrying..."
            else
              echo "Attempt $i: status $STATUS — retrying..."
            fi
            sleep 5
          done
          # Final attempt: show the response body to aid debugging
          echo "--- /api/health response ---"
          curl -sL "https://${{ vars.PUBLIC_HOSTNAME }}/api/health" || true
          echo
          echo "Site failed health check"
          exit 1

      - name: Auto-rollback on smoke check failure
        if: failure() && steps.smoke.conclusion == 'failure' && steps.prev.outputs.release != 'none'
        env:
          PREV: ${{ steps.prev.outputs.release }}
        run: |
          echo "⚠ smoke check failed — rolling back to $PREV"
          ssh -i ~/.ssh/deploy_key -p ${{ vars.VPS_PORT || 22 }} ${{ vars.VPS_USER }}@${{ vars.VPS_HOST }} bash <<EOF
            set -e
            cd /var/www/airomeda
            ln -sfn ${PREV} current
            pm2 reload /var/www/airomeda/current/ecosystem.config.cjs --update-env
          EOF
          # Verify rollback worked
          for i in 1 2 3; do
            STATUS=$(curl -sfL -o /dev/null -w "%{http_code}" https://${{ vars.PUBLIC_HOSTNAME }}/tr || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ rollback healthy"
              exit 1   # still fail the workflow — the deploy attempt didn't succeed
            fi
            sleep 5
          done
          echo "✗ rollback also unhealthy — manual intervention required"
          exit 1
